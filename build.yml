name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
      - run: flutter pub get
        working-directory: claw-agent
      - run: flutter build apk --release
        working-directory: claw-agent
      - uses: actions/upload-artifact@v4
        with:
          name: claw-apk
          path: claw-agent/build/app/outputs/flutter-apk/app-release.apk
